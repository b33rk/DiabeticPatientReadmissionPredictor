name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ── Lint & type check ────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install linting tools
        run: pip install ruff mypy

      - name: Ruff lint
        run: ruff check services/ training/ feature_store/ fairness/

      - name: Type check
        run: mypy services/api/app --ignore-missing-imports

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend lint
        working-directory: frontend
        run: npm ci && npm run lint

  # ── Backend unit tests ────────────────────────────────────────────────────────
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install API deps
        run: pip install -r services/api/requirements.txt -r services/monitoring/requirements.txt

      - name: Run unit tests
        run: pytest tests/unit/ -v --tb=short --cov=services --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml

  # ── Integration tests (spin up docker-compose) ────────────────────────────────
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Build and start services
        run: docker compose up -d --build postgres redis mlflow api data-validation
        timeout-minutes: 10

      - name: Wait for API to be healthy
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8001/health && break
            echo "Waiting for API... attempt $i"
            sleep 5
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run integration tests
        run: |
          pip install httpx pytest
          pytest tests/integration/ -v --tb=short

      - name: Collect logs on failure
        if: failure()
        run: docker compose logs

      - name: Teardown
        if: always()
        run: docker compose down -v

  # ── Adversarial input tests ───────────────────────────────────────────────────
  adversarial-tests:
    name: Adversarial tests
    runs-on: ubuntu-latest
    needs: integration-tests
    steps:
      - uses: actions/checkout@v4

      - name: Copy env file
        run: cp .env.example .env

      - name: Start API
        run: docker compose up -d --build postgres redis mlflow api
        timeout-minutes: 10

      - name: Wait for API
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8001/health && break
            sleep 5
          done

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run adversarial tests
        run: |
          pip install httpx pytest numpy
          pytest tests/adversarial/ -v --tb=short

      - name: Teardown
        if: always()
        run: docker compose down -v
