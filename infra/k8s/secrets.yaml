# IMPORTANT: Do not commit real values.
# Generate base64: echo -n "your-value" | base64
# Apply with:      kubectl apply -f secrets.yaml
#
# In CI/CD, generate this file from GitHub Secrets using envsubst or
# kubectl create secret generic rather than committing it.
apiVersion: v1
kind: Secret
metadata:
  name: readmission-secrets
  namespace: readmission
type: Opaque
data:
  POSTGRES_PASSWORD: Y2hhbmdlbWU=        # changeme (replace in prod)
  SECRET_KEY: Y2hhbmdlbWU=              # replace with real key
  ENCRYPTION_KEY: Y2hhbmdlbWU=          # replace with real Fernet key
  GRAFANA_PASSWORD: YWRtaW4=            # admin (replace in prod)
