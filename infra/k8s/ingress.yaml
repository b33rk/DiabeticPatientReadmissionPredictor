# K3s ships with Traefik as the default ingress controller.
# This routes external HTTP traffic to the correct service by path prefix.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: readmission-ingress
  namespace: readmission
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
    # Rate limit at ingress level (defense in depth)
    traefik.ingress.kubernetes.io/router.middlewares: readmission-ratelimit@kubernetescrd
spec:
  rules:
    - http:
        paths:
          # Frontend (catch-all, must come last)
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80

          # Inference API
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: api-service
                port:
                  number: 8001

          # Monitoring reports
          - path: /monitoring
            pathType: Prefix
            backend:
              service:
                name: monitoring-service
                port:
                  number: 8002

          # MLflow UI
          - path: /mlflow
            pathType: Prefix
            backend:
              service:
                name: mlflow-service
                port:
                  number: 5000
