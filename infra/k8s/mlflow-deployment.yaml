apiVersion: v1
kind: Service
metadata:
  name: mlflow-service
  namespace: readmission
spec:
  selector:
    app: mlflow
  ports:
    - port: 5000
      targetPort: 5000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: readmission
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mlflow
  template:
    metadata:
      labels:
        app: mlflow
    spec:
      containers:
        - name: mlflow
          image: ghcr.io/YOUR_ORG/readmission-mlflow:latest
          ports:
            - containerPort: 5000
          env:
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: readmission-secrets
                  key: POSTGRES_PASSWORD
            - name: BACKEND_STORE_URI
              value: "postgresql://readmission:$(POSTGRES_PASSWORD)@postgres-service:5432/readmission"
            - name: ARTIFACT_ROOT
              value: "/mlflow/artifacts"
          volumeMounts:
            - name: mlflow-artifacts
              mountPath: /mlflow/artifacts
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "1Gi"
              cpu: "500m"
      volumes:
        - name: mlflow-artifacts
          persistentVolumeClaim:
            claimName: mlflow-pvc
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-pvc
  namespace: readmission
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi
