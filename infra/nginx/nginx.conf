events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Upstream definitions ───────────────────────────────────────────────────
    upstream frontend  { server frontend:80; }
    upstream api       { server api:8001; }
    upstream monitoring { server monitoring:8002; }
    upstream mlflow    { server mlflow:5000; }
    upstream grafana   { server grafana:3000; }

    # ── Gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # ── Rate limiting (model inversion defense) ────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

    # ── Main server block ──────────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Frontend SPA
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Inference API
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 60s;
        }

        # Monitoring reports
        location /monitoring/ {
            proxy_pass http://monitoring/;
            proxy_set_header Host $host;
        }

        # MLflow UI (restrict to internal network in prod)
        location /mlflow/ {
            proxy_pass http://mlflow/;
            proxy_set_header Host $host;
        }

        # Grafana dashboards
        location /grafana/ {
            proxy_pass http://grafana/;
            proxy_set_header Host $host;
        }
    }
}
